- title: Profile
  type: text
  contents: >
    Biomedical informatics researcher with more than a decade of experience across the
    full span of healthcare data, from operational systems and data warehousing to
    research informatics. Work focuses on standardizing disparate clinical data and
    applying artificial intelligence, machine learning, and natural language processing
    to extract and harmonize high-value information from electronic health records.

